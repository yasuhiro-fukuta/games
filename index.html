<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games — yakkun</title>
<style>
  :root {
    --felt: #1e3a2f; --felt-dark: #142921; --paper: #fbf8ef;
    --ink: #26241f; --gold: #c9a227; --dim: rgba(251,248,239,.6);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    min-height: 100%;
    background: radial-gradient(ellipse at 50% 30%, var(--felt), var(--felt-dark) 80%);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    color: var(--paper);
  }
  main { max-width: 560px; margin: 0 auto; padding: 48px 20px; }
  h1 {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    color: var(--gold); letter-spacing: .3em; font-size: 28px;
    text-align: center; margin-bottom: 6px;
  }
  .sub { text-align: center; color: var(--dim); font-size: 12px; letter-spacing: .15em; margin-bottom: 36px; }
  a.game {
    display: block; text-decoration: none; color: var(--paper);
    background: rgba(0,0,0,.28); border: 1px solid rgba(251,248,239,.15);
    border-radius: 14px; padding: 20px 22px; margin-bottom: 16px;
    transition: transform .15s ease, border-color .15s;
  }
  a.game:hover { transform: translateY(-3px); border-color: var(--gold); }
  a.game .name { font-size: 18px; font-weight: bold; color: var(--gold); letter-spacing: .06em; }
  a.game .desc { font-size: 13px; color: var(--dim); margin-top: 6px; line-height: 1.7; }
</style>
</head>
<body>
<main>
  <h1>遊 技 場</h1>
  <div class="sub">TRUMP GAMES</div>
  <a class="game" href="./duema/">
    <div class="name">⚔️ トランプデュエル(duema)</div>
    <div class="desc">手札が土地にもクリーチャーにもなる1対1カードバトル。CPU対戦&amp;部屋コードでオンライン対戦。</div>
  </a>
  <a class="game" href="./daifugo/">
    <div class="name">🃏 大富豪</div>
    <div class="desc">4人対戦(あなた+CPU3人)。革命・8切り・Jバック・スペ3返し・ジョーカーワイルド対応。</div>
  </a>
</main>
</body>
</html>
